name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  pull_request:

jobs:
  browser-import-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build workspace
        run: npm run build

      - name: Run browser-import regression tests
        run: npm run test --workspace=@citolab/qti-browser-import

      - name: Run CLI tests
        run: npm run test --workspace=@citolab/qti-convert-cli

      - name: Run TAO PCI tests
        run: npm run test --workspace=@citolab/qti-convert-tao-pci

      - name: Run TAO PCI Storybook interaction tests
        run: npm run test:storybook --workspace=@citolab/qti-convert-tao-pci
